{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Register - Energetic Eats</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Nunito+Sans:wght@400;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="{% static 'tasks/css/styles.css' %}" />
</head>

<body>

    <div class="bg-decorations">
        <div class="decor-blob-1"></div>
        <div class="decor-blob-2"></div>
    </div>

    <main class="auth-wrapper">

        <div class="brand-header">
            <div class="brand-icon-box">
                <span class="material-symbols-outlined"
                    style="font-variation-settings: 'FILL' 1; color: white; font-size: 32px;">restaurant</span>
            </div>
            <h1 class="brand-title">El Buen Querer</h1>
            <p class="brand-subtitle">Donde comer es un placer.</p>
        </div>

        <div class="auth-card">
            <form action="#" method="POST">
                {% csrf_token %} 
                
                {% if error %}
                <div class="alert-error">
                    <span class="material-symbols-outlined">error</span>
                    {{ error }}
                </div>
                {% endif %}
                
                <div class="form-group">
                    <label class="form-label" for="name">Nombre</label>
                    <div class="input-container">
                        <span class="material-symbols-outlined">person</span>
                        <input class="form-control" id="name" name="name" placeholder="Matias" type="text" required />
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Correo</label>
                    <div class="input-container">
                        <span class="material-symbols-outlined">mail</span>
                        <input class="form-control" id="email" name="email" placeholder="email@example.com" type="email"
                            required />
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm_email">Confirme Correo</label>
                    <div class="input-container">
                        <span class="material-symbols-outlined">mark_email_read</span>
                        <input class="form-control" id="confirm_email" name="confirm_email"
                            placeholder="Confirme su correo" type="email" required />
                    </div>
                </div>

                <div class="form-grid">
                    <div>
                        <label class="form-label" for="password">Contraseña</label>
                        <div class="input-container">
                            <span class="material-symbols-outlined">lock</span>
                            <input class="form-control" id="password" name="password" placeholder="••••••••"
                                type="password" required />
                        </div>
                    </div>
                    <div>
                        <label class="form-label" for="confirm_password">Confirme Contraseña</label>
                        <div class="input-container">
                            <span class="material-symbols-outlined">verified_user</span>
                            <input class="form-control" id="confirm_password" name="confirm_password"
                                placeholder="••••••••" type="password" required />
                        </div>
                    </div>
                </div>
                <button class="btn-submit" type="submit">
                    <span>Crear Cuenta</span>
                    <span class="material-symbols-outlined" style="font-size: 20px;">arrow_forward</span>
                </button>
            </form>

            <div class="auth-card-footer">
                <p>
                    Ya tiene una cuenta?
                    <a href="/signin">Iniciar Sesión</a>
                </p>
            </div>
        </div>
    </main>

    <div class="side-badge">
        <div class="badge-content">
            <div class="badge-alert-dot">!</div>
            <p class="badge-text">"No dejes para mañana lo que puedes comer hoy!"</p>
        </div>
    </div>

</body>

</html>
