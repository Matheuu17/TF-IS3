{% extends 'base.html' %}

{% block content %}
<div class="flex-grow flex items-center justify-center -mt-8 sm:-mt-16 w-full text-center">
    <div class="max-w-md">
        <div class="text-orange-500 mb-6">
            <i class="fa-solid fa-face-frown-open text-9xl animate-bounce"></i>
        </div>
        <h1 class="text-6xl font-extrabold text-gray-900 dark:text-white tracking-tight mb-2">404</h1>
        <h2 class="text-3xl font-bold text-gray-800 dark:text-gray-200 mb-4">Plato no encontrado</h2>
        <p class="text-lg text-gray-600 dark:text-gray-400 mb-8">
            Lo sentimos, parece que la página que buscas no está en nuestro menú. Verifica la dirección o regresa al inicio.
        </p>
        <a href="/" class="inline-flex items-center justify-center px-8 py-3.5 text-base font-semibold text-white transition-all transform rounded-full shadow-lg bg-orange-500 hover:bg-orange-600 hover:-translate-y-1 shadow-orange-500/30 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500">
            <i class="fa-solid fa-house mr-2"></i> Volver al Inicio
        </a>
    </div>
</div>
{% endblock %}
